
      <!-- LOG CARD -->
      <article class="card">
        <header class="card-head">
          <h2 data-i18n="logTitle">Log em tempo real</h2>
          <div class="tools tools-compact">
            <label class="toggle-row"><input type="checkbox" id="chk-autoscroll" checked><span class="toggle-label" data-i18n="autoscroll">autoscroll</span></label>
            <button class="icon-btn" id="btn-clear-logs" type="button" data-i18n-title="clearLogTitle" title="Limpar log" aria-label="Limpar log">✕</button>
          </div>
        </header>
        <div class="card-body"><div id="log" role="log" aria-live="off" data-i18n-aria="logAriaLabel" aria-label="Log em tempo real"><div class="log-empty" data-i18n="logWaiting">Aguardando eventos…</div></div></div>
      </article>
