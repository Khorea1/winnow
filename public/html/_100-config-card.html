      <!-- CONFIG CARD -->
      <article class="card">
        <header class="card-head"><h2 data-i18n="rotatorConfigTitle">Configuração do rotator</h2></header>
        <div class="card-body pad">
          <div class="field"><label data-i18n="proxyFileLabel">Arquivo de proxies</label><div class="readonly-field" id="cfg-file-readonly">—</div><div class="hint" data-i18n="proxyFileHint">Definido por linha de comando ou variável de ambiente ao iniciar o processo — não é editável por aqui.</div></div>
          <div class="field-row">
            <div class="field"><label for="cfg-retries" data-i18n="retriesLabel">Retries</label><input type="number" id="cfg-retries" class="mono" min="1" max="20" value="5"><div class="hint" data-i18n="retriesHint">tentativas por requisição</div></div>
            <div class="field"><label for="cfg-maxErrors" data-i18n="maxErrorsLabel">Máx. erros</label><input type="number" id="cfg-maxErrors" class="mono" min="0" max="100" value="3"><div class="hint" data-i18n="maxErrorsHint">acima disso, proxy é ignorado</div></div>
          </div>
          <div class="field"><label for="cfg-timeout" data-i18n="rotatorTimeoutLabel">Timeout do rotator (ms)</label><input type="number" id="cfg-timeout" class="mono" min="500" max="60000" value="3500"></div>
          <div class="field"><label for="cfg-upstreamIdleTimeout" data-i18n="upstreamIdleLabel">Timeout idle do upstream (ms)</label><input type="number" id="cfg-upstreamIdleTimeout" class="mono" min="0" max="120000" value="0"><div class="hint" data-i18n="upstreamIdleHint">0 = automático (2× timeout do rotator), define quanto tempo sem dados do upstream antes de abortar</div></div>
          <div class="field"><label for="cfg-targets" data-i18n="targetsLabel">Alvos de health-check (um por linha)</label><textarea id="cfg-targets" rows="3" class="mono" placeholder="httpbin.org:80&#10;opencode.ai:443"></textarea></div>
          <button id="cfg-save" class="btn btn-primary btn-full" type="button" data-i18n="saveConfigBtn">Salvar configuração</button>
          <div id="cfg-msg" class="cfg-msg" role="status"></div>
        </div>
      </article>
