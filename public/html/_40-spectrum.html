
  <!-- SPECTRUM -->
  <div class="card spectrum-card">
    <div class="card-head">
      <h2 data-i18n="spectrumTitle">Distribuição de saúde da amostra</h2>
      <div class="spectrum-legend">
        <span><i class="legend-ok"></i><span data-i18n="legendHealthy">saudável</span></span>
        <span><i class="legend-warn"></i><span data-i18n="legendSlow">lento</span></span>
        <span><i class="legend-err"></i><span data-i18n="legendError">com erro</span></span>
        <span><i class="legend-ban"></i><span data-i18n="legendBanned">banido</span></span>
      </div>
    </div>
    <div id="spectrum" role="img" data-i18n-aria="spectrumAriaLabel" aria-label="Barras representando o estado de cada proxy da amostra atual"></div>
  </div>
